{{define "tag_edit"}}
{{template "base" .}}
{{end}}

{{define "content"}}
<h1>{{if .IsNew}}New Tag{{else}}Edit Tag{{end}}</h1>
{{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
<form method="POST" action="/tags/{{.CurrentName}}">
  <div class="form-group">
    <label>Name</label>
    <input type="text" name="name" value="{{.Tag.Name}}" required>
  </div>
  <div class="form-group">
    <label>Description</label>
    <input type="text" name="description" value="{{.Tag.Description}}">
  </div>
  <div class="form-group">
    <label>Category</label>
    <select name="category">
      <option value="">— none —</option>
      {{range .Categories}}
      <option value="{{.Name}}" {{if and $.Tag.Category (eq (deref $.Tag.Category) .Name)}}selected{{end}}>{{.Name}}</option>
      {{end}}
    </select>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  {{if not .IsNew}}
  <button type="button" class="btn btn-danger"
    hx-delete="/tags/{{.CurrentName}}"
    hx-confirm="Delete tag {{.CurrentName}}?"
    hx-push-url="/tags">Delete</button>
  {{end}}
</form>
{{end}}
