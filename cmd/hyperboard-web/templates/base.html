{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyperboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
<nav>
  <span class="nav-brand">Hyperboard</span>
  <a href="/">Gallery</a>
  <a href="/upload">Upload</a>
  <a href="/tags">Tags</a>
  <a href="/tag-categories">Tag Categories</a>
  <a href="/notes">Notes</a>
  <span class="nav-spacer"></span>
  <form action="/logout" method="POST" style="margin:0">
    <button type="submit">Log Out</button>
  </form>
</nav>
<main>
<div id="error-banner" class="alert-error" style="display:none"></div>
{{block "content" .}}{{end}}
</main>
<script>
// Show error banner with message, auto-dismiss after 8 seconds
function showError(msg) {
  var banner = document.getElementById('error-banner');
  banner.textContent = msg;
  banner.style.display = '';
  clearTimeout(banner._timeout);
  banner._timeout = setTimeout(function() { banner.style.display = 'none'; }, 8000);
}

// Handle HTMX HTTP error responses (4xx, 5xx)
document.body.addEventListener('htmx:responseError', function(e) {
  var xhr = e.detail.xhr;
  var msg = xhr.responseText || ('Request failed: HTTP ' + xhr.status);
  showError(msg.trim());
});

// Handle HTMX network/send errors
document.body.addEventListener('htmx:sendError', function(e) {
  showError('Network error: could not reach server');
});
</script>
</body>
</html>
{{end}}
