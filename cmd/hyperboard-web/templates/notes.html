{{define "notes"}}
{{template "base" .}}
{{end}}

{{define "content"}}
{{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
<div class="flex items-center gap-2 mt-1">
  <h1>Notes</h1>
  <a href="/notes/_new" class="btn btn-primary">New Note</a>
</div>
<ul class="tag-list mt-2">
{{range .Notes}}
<li><a href="/notes/{{.ID}}">{{.Title}}</a></li>
{{end}}
</ul>
{{end}}
