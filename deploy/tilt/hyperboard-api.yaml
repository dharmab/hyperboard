apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperboard-api
  labels:
    app.kubernetes.io/name: hyperboard-api
    app.kubernetes.io/part-of: hyperboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hyperboard-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hyperboard-api
        app.kubernetes.io/part-of: hyperboard
    spec:
      containers:
        - name: hyperboard-api
          image: hyperboard-api
          ports:
            - name: api
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hyperboard-api
  labels:
    app.kubernetes.io/name: hyperboard-api
    app.kubernetes.io/part-of: hyperboard
spec:
  selector:
    app.kubernetes.io/name: hyperboard-api
  ports:
    - port: 80
      targetPort: api
  type: ClusterIP
