apiVersion: apps/v1
kind: Deployment
metadata:
  name: hyperboard-web
  labels:
    app.kubernetes.io/name: hyperboard-web
    app.kubernetes.io/part-of: hyperboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hyperboard-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hyperboard-web
        app.kubernetes.io/part-of: hyperboard
    spec:
      containers:
        - name: hyperboard-web
          image: hyperboard-web
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: hyperboard-web
  labels:
    app.kubernetes.io/name: hyperboard-web
    app.kubernetes.io/part-of: hyperboard
spec:
  selector:
    app: hyperboard-web
  ports:
    - port: 80
      targetPort: http
  type: ClusterIP
