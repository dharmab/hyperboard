apiVersion: v1
kind: Service
metadata:
  name: rustfs
  labels:
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/part-of: hyperboard
spec:
  ports:
    - port: 9000
      targetPort: s3
      name: s3
    - port: 9001
      targetPort: console
      name: console
  selector:
    app.kubernetes.io/name: rustfs
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rustfs
  labels:
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/part-of: hyperboard
spec:
  serviceName: "rustfs"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs
        app.kubernetes.io/part-of: hyperboard
    spec:
      containers:
        - name: rustfs
          image: rustfs/rustfs:1.0.0-alpha.85
          args:
            - /data
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          env:
            - name: RUSTFS_ACCESS_KEY
              value: rustfsadmin
            - name: RUSTFS_SECRET_KEY
              value: rustfsadmin
            - name: RUSTFS_CONSOLE_ENABLE
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health/ready
              port: s3
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
