{{define "notes"}}
{{template "base" .}}
{{end}}

{{define "content"}}
{{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
<div class="flex items-center gap-2 mt-1">
  <h1>Notes</h1>
  <form method="POST" action="/notes" style="display:inline">
    <button type="submit" class="btn btn-primary">New Note</button>
  </form>
</div>
<table class="data-table mt-2" id="notes-table">
  <thead>
    <tr>
      <th class="sortable sorted-asc" data-sort="title" data-type="string">Title</th>
      <th class="sortable" data-sort="updated" data-type="string">Updated</th>
    </tr>
  </thead>
  <tbody>
  {{range .Notes}}
    <tr>
      <td data-value="{{.Title}}">
        <a href="/notes/{{.ID}}">{{.Title}}</a>
      </td>
      <td data-value="{{.UpdatedAt}}">{{.UpdatedAt}}</td>
    </tr>
  {{end}}
  </tbody>
</table>
<script src="/static/table-sort.js"></script>
{{end}}
