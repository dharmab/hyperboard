{{define "tags"}}
{{template "base" .}}
{{end}}

{{define "content"}}
{{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
<div class="flex items-center gap-2 mt-1">
  <h1>Tags</h1>
  <a href="/tags/_new" class="btn btn-primary">New Tag</a>
</div>
<div class="ac-wrapper" style="margin-top:0.5rem">
  <input
    type="text"
    name="q"
    placeholder="Search tags…"
    hx-get="/tag-suggestions"
    hx-trigger="input changed delay:200ms"
    hx-target="next .ac-dropdown"
    autocomplete="off"
    id="tags-search"
  >
  <div class="ac-dropdown"></div>
</div>
<table class="data-table mt-2" id="tags-table">
  <thead>
    <tr>
      <th class="sortable sorted-asc" data-sort="name" data-type="string">Name</th>
      <th class="sortable" data-sort="category" data-type="string">Category</th>
      <th class="sortable" data-sort="description" data-type="string">Description</th>
      <th class="sortable" data-sort="aliases" data-type="string">Aliases</th>
      <th class="sortable" data-sort="cascading" data-type="string">Cascading Tags</th>
      <th class="sortable" data-sort="posts" data-type="number">Posts</th>
    </tr>
  </thead>
  <tbody>
  {{template "tags_rows" .}}
  </tbody>
</table>
<script src="/static/table-sort.js"></script>
<script src="/static/tags-search.js"></script>
{{end}}
