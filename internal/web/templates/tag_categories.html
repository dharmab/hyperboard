{{define "tag_categories"}}
{{template "base" .}}
{{end}}

{{define "content"}}
{{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
<div class="flex items-center gap-2 mt-1">
  <h1>Tag Categories</h1>
  <a href="/tag-categories/_new" class="btn btn-primary">New Category</a>
</div>
<table class="data-table mt-2" id="tag-categories-table">
  <thead>
    <tr>
      <th class="sortable sorted-asc" data-sort="name" data-type="string">Name</th>
      <th class="sortable" data-sort="description" data-type="string">Description</th>
      <th class="sortable" data-sort="tags" data-type="number">Tags</th>
      <th>Color</th>
    </tr>
  </thead>
  <tbody>
  {{range .Categories}}
    <tr>
      <td data-value="{{.Name}}">
        <a href="/tag-categories/{{.Name}}">{{.Name}}</a>
      </td>
      <td data-value="{{.Description}}">{{.Description}}</td>
      <td data-value="{{index $.TagCounts .Name}}">{{index $.TagCounts .Name}}</td>
      <td><span class="color-swatch" style="background:{{.Color}}"></span> {{.Color}}</td>
    </tr>
  {{end}}
  </tbody>
</table>
<script>
(function() {
  const table = document.getElementById('tag-categories-table');
  const headers = table.querySelectorAll('th.sortable');
  headers.forEach(th => {
    th.style.cursor = 'pointer';
    th.addEventListener('click', () => {
      const col = th.cellIndex;
      const type = th.dataset.type;
      const asc = !th.classList.contains('sorted-asc');
      headers.forEach(h => { h.classList.remove('sorted-asc', 'sorted-desc'); });
      th.classList.add(asc ? 'sorted-asc' : 'sorted-desc');
      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a, b) => {
        const av = a.cells[col].dataset.value;
        const bv = b.cells[col].dataset.value;
        let cmp;
        if (type === 'number') {
          cmp = parseInt(av, 10) - parseInt(bv, 10);
        } else {
          cmp = av.localeCompare(bv, undefined, {sensitivity: 'base'});
        }
        return asc ? cmp : -cmp;
      });
      rows.forEach(r => tbody.appendChild(r));
    });
  });
})();
</script>
{{end}}
