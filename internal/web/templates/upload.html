{{define "upload"}}
{{template "base" .}}
{{end}}

{{define "content"}}
<h1>Upload</h1>
{{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
<form id="upload-form" method="POST" action="/upload" enctype="multipart/form-data">
  <div class="form-group">
    <label>Files</label>
    <input type="file" id="file-input" accept="image/*,video/*" multiple>
  </div>
  <div id="paste-zone" contenteditable="true" tabindex="0">
    <p>Or paste from clipboard (Ctrl+V / Cmd+V / right-click → Paste)</p>
  </div>
  <button type="submit" class="btn btn-primary" style="margin-bottom: 1rem;">Upload</button>
  <div id="preview-zone"></div>
</form>
<style>
  #paste-zone {
    border: 2px dashed #666;
    border-radius: 4px;
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    margin-bottom: 1rem;
  }
  #paste-zone:focus {
    border-color: #4a9eff;
    outline: none;
  }
  #paste-zone.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }
  #preview-zone {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  #preview-zone:empty {
    display: none;
  }
  .file-preview {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.5rem;
    border: 1px solid #444;
    border-radius: 4px;
  }
  .file-preview-thumb {
    flex-shrink: 0;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 4px;
  }
  .file-preview-thumb img {
    max-width: 120px;
    max-height: 120px;
    border-radius: 4px;
  }
  .file-preview-thumb .file-name {
    padding: 1rem 0.5rem;
    text-align: center;
    word-break: break-all;
    font-size: 0.85em;
  }
  .file-preview-info {
    flex: 1;
    min-width: 0;
  }
  .file-preview .remove-btn {
    flex-shrink: 0;
    background: #c00;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 0.25rem 0.5rem;
    cursor: pointer;
    font-size: 12px;
  }
  .file-preview .progress-bar {
    width: 100%;
    height: 4px;
    background: #333;
    border-radius: 2px;
    margin-top: 4px;
    overflow: hidden;
  }
  .file-preview .progress-bar .progress-fill {
    height: 100%;
    width: 0%;
    background: #4a9eff;
    transition: width 0.2s;
  }
  .file-preview.upload-success .progress-fill { background: #2a2; }
  .file-preview.upload-error .progress-fill { background: #c00; }
  .file-preview.upload-similar .progress-fill { background: #da0; }
  .file-preview .upload-status {
    font-size: 0.85em;
    margin-top: 4px;
    word-break: break-word;
  }
  .similar-posts {
    margin-top: 0.5rem;
  }
  .similar-posts-label {
    font-size: 0.85em;
    color: #da0;
    margin-bottom: 0.25rem;
  }
  .similar-posts-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .similar-thumb {
    display: block;
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 4px;
    border: 2px solid #444;
  }
  .similar-thumb:hover {
    border-color: #4a9eff;
  }
  .similar-actions {
    margin-top: 0.5rem;
    display: flex;
    gap: 0.5rem;
  }
  .similar-actions .btn {
    font-size: 0.85em;
    padding: 0.25rem 0.75rem;
  }
</style>
<script src="/static/upload.js"></script>
{{end}}
