openapi: 3.0.0
info:
  title: Hyperboard API
  version: 0.1.0
paths:
  /metrics:
    get:
      operationId: getMetrics
      security: []
      responses:
        "200":
          $ref: "#/components/responses/MetricsResponse"
  /healthz:
    get:
      operationId: getHealth
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthyResponse"
  /readyz:
    get:
      operationId: getReadiness
      security: []
      responses:
        "200":
          $ref: "#/components/responses/HealthyResponse"
        "503":
          $ref: "#/components/responses/UnhealthyResponse"
  /api/v1/tags:
    get:
      operationId: getTags
      summary: List tags.
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          $ref: "#/components/responses/TagsResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
  /api/v1/tags/{tag}:
    put:
      operationId: putTag
      summary: Create or replace a tag by name.
      parameters:
        - $ref: "#/components/parameters/tag"
      requestBody:
        $ref: "#/components/requestBodies/TagRequest"
      responses:
        "201":
          $ref: "#/components/responses/TagResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      operationId: getTag
      summary: Get a tag by name.
      parameters:
        - $ref: "#/components/parameters/tag"
      responses:
        "200":
          $ref: "#/components/responses/TagResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    delete:
      operationId: deleteTag
      summary: Delete a tag. The tag will be removed from any posts and tag categories.
      parameters:
        - $ref: "#/components/parameters/tag"
      responses:
        "204":
          $ref: "#/components/responses/DeletedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
  /api/v1/tagCategories:
    get:
      operationId: getTagCategories
      summary: List tag categories.
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          $ref: "#/components/responses/TagCategoriesResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
  /api/v1/tagCategories/{tagCategory}:
    put:
      operationId: putTagCategory
      summary: Create or replace a tag category by name.
      parameters:
        - $ref: "#/components/parameters/tagCategory"
      requestBody:
        $ref: "#/components/requestBodies/TagCategoryRequest"
      responses:
        "200":
          $ref: "#/components/responses/TagCategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      operationId: getTagCategory
      summary: Get a tag category by name.
      parameters:
        - $ref: "#/components/parameters/tagCategory"
      responses:
        "200":
          $ref: "#/components/responses/TagCategoryResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    delete:
      operationId: deleteTagCategory
      summary: Delete a tag category. All tags with this category will have their category unset.
      parameters:
        - $ref: "#/components/parameters/tagCategory"
      responses:
        "204":
          $ref: "#/components/responses/DeletedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
  /api/v1/posts:
    get:
      operationId: getPosts
      summary: Search for posts.
      parameters:
        - $ref: "#/components/parameters/cursor"
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/search"
      responses:
        "200":
          $ref: "#/components/responses/PostsResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
  /api/v1/upload:
    post:
      operationId: uploadPost
      summary: Upload a new post's content.
      requestBody:
        $ref: "#/components/requestBodies/UploadPostRequest"
      responses:
        "201":
          $ref: "#/components/responses/UploadPostResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
  /api/v1/posts/{id}:
    put:
      operationId: putPost
      summary: Replace a post's metadata. This does not create a new post - use uploadPost to create a new post.
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        $ref: "#/components/requestBodies/PostRequest"
      responses:
        "200":
          $ref: "#/components/responses/PostResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    get:
      operationId: getPost
      summary: Get a post's metadata by ID.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          $ref: "#/components/responses/PostResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
    delete:
      operationId: deletePost
      summary: Delete a post's metadata and content.
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "204":
          $ref: "#/components/responses/DeletedResponse"
        "400":
          $ref: "#/components/responses/BadRequestResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedResponse"
        "403":
          $ref: "#/components/responses/ForbiddenResponse"
        "404":
          $ref: "#/components/responses/NotFoundResponse"
        "429":
          $ref: "#/components/responses/TooManyRequestsResponse"
        "500":
          $ref: "#/components/responses/InternalServerErrorResponse"
components:
  schemas:
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
    Cursor:
      type: string
    Limit:
      type: integer
      minimum: 1
      maximum: 1024
      default: 24
    Search:
      type: string
  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        $ref: "types-spec.yaml#/components/schemas/ID"
    tagCategory:
      name: tagCategory
      in: path
      required: true
      schema:
        $ref: "types-spec.yaml#/components/schemas/TagCategoryName"
    tag:
      name: tag
      in: path
      required: true
      schema:
        $ref: "types-spec.yaml#/components/schemas/TagName"
    cursor:
      name: cursor
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Cursor"
    limit:
      name: limit
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Limit"
    search:
      name: search
      in: query
      required: false
      schema:
        $ref: "#/components/schemas/Search"
  requestBodies:
    TagRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "types-spec.yaml#/components/schemas/Tag"
    TagCategoryRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "types-spec.yaml#/components/schemas/TagCategory"
    UploadPostRequest:
      required: true
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    PostRequest:
      required: true
      content:
        application/json:
          schema:
            $ref: "types-spec.yaml#/components/schemas/Post"
  responses:
    MetricsResponse:
      content:
        text/plain:
          schema:
            type: string
    HealthyResponse:
      content:
        text/plain:
          schema:
            type: string
    UnhealthyResponse:
      content:
        text/plain:
          schema:
            type: string
    DeletedResponse:
      description: Resource deleted successfully
    BadRequestResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnauthorizedResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ForbiddenResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFoundResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequestsResponse:
      headers:
        Retry-After:
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalServerErrorResponse:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TagResponse:
      content:
        application/json:
          schema:
            $ref: "types-spec.yaml#/components/schemas/Tag"
    TagsResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              items:
                type: array
                items:
                  $ref: "types-spec.yaml#/components/schemas/Tag"
              cursor:
                $ref: "#/components/schemas/Cursor"
    TagCategoryResponse:
      content:
        application/json:
          schema:
            $ref: "types-spec.yaml#/components/schemas/TagCategory"
    TagCategoriesResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              items:
                type: array
                items:
                  $ref: "types-spec.yaml#/components/schemas/TagCategory"
              cursor:
                $ref: "#/components/schemas/Cursor"
    PostResponse:
      content:
        application/json:
          schema:
            $ref: "types-spec.yaml#/components/schemas/Post"
    UploadPostResponse:
      content:
        application/json:
          schema:
            $ref: "types-spec.yaml#/components/schemas/ID"
    PostsResponse:
      content:
        application/json:
          schema:
            type: object
            properties:
              items:
                type: array
                items:
                  $ref: "types-spec.yaml#/components/schemas/Post"
              cursor:
                $ref: "#/components/schemas/Cursor"
